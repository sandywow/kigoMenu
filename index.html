<head>

  <!-- Open Graph -->
  <meta property="og:type" content="restaurant.menu">
  <meta property="og:title" content="享．奇果 — Seasonal Menu">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="享．奇果 — Seasonal Menu">

  <meta name="twitter:image" content="https://sandywow.github.io/kigoMenu/src/lemon%20pound.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════ -->
<!--  LANDING PAGE                      -->
<!-- ═══════════════════════════════════ -->
<section class="page visible" id="landing" aria-label="Welcome">

  <header class="landing-header">
    <div class="cafe-logo-text" id="cafe-name"></div>
    <div class="cafe-logo-jp"   id="cafe-sub"></div>
    <div class="landing-date"   id="landing-date-line"></div>
  </header>

  <div class="deco-rule"><span>◆</span></div>

  <!-- Hero visual (JS swaps in a real image if heroImage is set) -->
  <div class="hero-wrapper">
    <div class="hero-illustrated" id="hero-visual">
      <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="110" cy="165" rx="80" ry="14" fill="rgba(189,153,117,0.18)"/>
        <ellipse cx="110" cy="163" rx="75" ry="11" fill="rgba(237,229,216,0.9)" stroke="rgba(139,94,60,0.15)" stroke-width="1"/>
        <rect x="62" y="100" width="96" height="65" rx="4" fill="#E8DCC8"/>
        <rect x="62" y="100" width="96" height="22" rx="4" fill="#D9CFC0"/>
        <ellipse cx="110" cy="100" rx="50" ry="10" fill="#F2ECE2"/>
        <ellipse cx="110" cy="66"  rx="18" ry="20" fill="rgba(200,100,80,0.75)"/>
        <ellipse cx="110" cy="63"  rx="14" ry="16" fill="rgba(210,115,95,0.6)"/>
        <path d="M103 58 Q110 52 117 58" stroke="rgba(139,94,60,0.5)" stroke-width="1" fill="none"/>
        <ellipse cx="96"  cy="56" rx="8" ry="4" fill="rgba(122,125,92,0.65)" transform="rotate(-30,96,56)"/>
        <ellipse cx="124" cy="56" rx="8" ry="4" fill="rgba(122,125,92,0.55)" transform="rotate(30,124,56)"/>
        <circle cx="80"  cy="92" r="5" fill="rgba(242,236,226,0.9)"/>
        <circle cx="140" cy="90" r="4" fill="rgba(242,236,226,0.8)"/>
        <circle cx="158" cy="96" r="3" fill="rgba(242,236,226,0.7)"/>
        <circle cx="62"  cy="96" r="3" fill="rgba(242,236,226,0.7)"/>
        <line x1="165" y1="110" x2="165" y2="155" stroke="rgba(139,94,60,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M162 110 L162 120 M165 110 L165 120 M168 110 L168 120 M162 120 Q165 126 168 120" fill="none" stroke="rgba(139,94,60,0.4)" stroke-width="1.2"/>
        <ellipse cx="48"  cy="72"  rx="5" ry="3"   fill="rgba(237,232,154,0.5)"  transform="rotate(-20,48,72)"/>
        <ellipse cx="172" cy="80"  rx="4" ry="2.5" fill="rgba(164,168,120,0.4)"  transform="rotate(15,172,80)"/>
        <ellipse cx="38"  cy="130" rx="3" ry="2"   fill="rgba(237,232,154,0.35)" transform="rotate(40,38,130)"/>
        <ellipse cx="185" cy="120" rx="4" ry="2"   fill="rgba(164,168,120,0.3)"  transform="rotate(-10,185,120)"/>
      </svg>
    </div>
    <div class="seasonal-badge" id="hero-badge"></div>
    <div class="hero-caption">
      <h2 id="hero-title"></h2>
      <p  id="hero-subtitle"></p>
    </div>
  </div>

  <!-- Tagline -->
  <div class="tagline-block">
    <p id="landing-tagline"></p>
    <span class="jp" id="landing-tagline-jp"></span>
  </div>

  <!-- Today's recommendation card -->
  <div class="seasonal-card" id="seasonal-card">
    <div class="card-label"       id="card-label-text"></div>
    <div class="card-item-name"   id="card-name"></div>
    <div class="card-item-name-jp" id="card-name-jp"></div>
    <p   class="card-desc"        id="card-desc"></p>
    <div class="card-price">
      <span id="card-price"></span>
      <span class="card-tag" id="card-tag"></span>
    </div>
  </div>

  <!-- Seasonal banner -->
  <div class="banner-section" id="banner-section">
    <div class="banner-label" id="banner-label-text"></div>
    <div id="banner-display"></div>
  </div>

  <!-- CTA -->
  <div class="cta-wrapper">
    <button class="btn-menu" id="cta-btn" onclick="showMenu()"></button>
    <span class="btn-hint" id="cta-hint"></span>
  </div>

  <footer class="landing-footer" id="landing-footer">
    <span id="footer-left"></span>
    <span id="footer-right"></span>
  </footer>

</section>


<!-- ═══════════════════════════════════ -->
<!--  MENU PAGE                         -->
<!-- ═══════════════════════════════════ -->
<section class="page hidden" id="menu-page" aria-label="Full Menu">

  <div class="menu-header">
    <div class="menu-header-top">
      <button class="back-btn" onclick="showLanding()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        返回
      </button>
      <div style="text-align:right" id="menu-logo-wrap"></div>
    </div>
    <div style="margin-top:16px">
      <div class="menu-title"    id="menu-title-text"></div>
      <div class="menu-subtitle" id="menu-subtitle-text"></div>
    </div>
  </div>

  <!-- Sticky tab bar (populated by JS from tabs config) -->
  <nav class="tab-bar" id="tab-bar" role="tablist"></nav>

  <!-- Menu items injected here by renderSection() -->
  <div id="menu-content"></div>

</section>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
